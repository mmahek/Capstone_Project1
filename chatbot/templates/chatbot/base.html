<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Health Assistant{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {}
        }
      }
    </script>
    <style>
        .sidebar-link:hover {
            @apply bg-white/20;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-200">

  <div class="flex">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-gradient-to-b from-teal-600 to-teal-700 text-white shadow-2xl min-h-screen p-6 space-y-6 transition-all duration-300">
      
      <div class="flex items-center space-x-3">
        <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center">
          🩺
        </div>
        <h1 class="text-2xl font-bold">HealthBot</h1>
      </div>

      <nav class="space-y-1">
        <a href="{% url 'dashboard' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group">
          <span>🏠</span>
          <span>Dashboard</span>
        </a>

        <a href="{% url 'chat-page' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group bg-white/10">
          <span>💬</span>
          <span>Chat</span>
        </a>

        <a href="{% url 'alerts' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group">
          <span>⚠️</span>
          <span>Alerts</span>
        </a>

        <a href="{% url 'chat-history' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group">
          <span>📜</span>
          <span>History</span>
        </a>

        <a href="{% url 'health-records' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group">
          <span>📁</span>
          <span>Records</span>
        </a>

        <a href="{% url 'accounts:profile' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group">
          <span>👤</span>
          <span>Profile</span>
        </a>

        <a href="{% url 'logout' %}" class="sidebar-link block px-4 py-3 rounded-xl flex items-center space-x-3 group mt-auto border-t border-white/20 pt-4">
          <span>🚪</span>
          <span>Logout</span>
        </a>
      </nav>

      <!-- Theme Toggle -->
      <button id="themeToggle" class="w-full p-3 bg-white/10 hover:bg-white/20 rounded-xl transition-all flex items-center justify-center space-x-2 text-sm">
        <span class="sun-icon">☀️</span>
        <span class="moon-icon hidden">🌙</span>
        <span id="themeLabel">Light</span>
      </button>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">
      {% block content %}{% endblock %}
    </main>

  </div>

<script>
  // Theme Toggle Logic
  (function() {
    const html = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const label = document.getElementById('themeLabel');
    const sun = toggle.querySelector('.sun-icon');
    const moon = toggle.querySelector('.moon-icon');

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    html.classList.toggle('dark', savedTheme === 'dark');
    label.textContent = savedTheme === 'dark' ? 'Light' : 'Dark';
    sun.classList.toggle('hidden', savedTheme === 'dark');
    moon.classList.toggle('hidden', savedTheme !== 'dark');

    // Toggle handler
    toggle.addEventListener('click', () => {
      const isDark = html.classList.toggle('dark');
      label.textContent = isDark ? 'Light' : 'Dark';
      sun.classList.toggle('hidden', isDark);
      moon.classList.toggle('hidden', !isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });
  })();
</script>

</body>
</html>
