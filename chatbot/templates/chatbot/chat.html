{% extends 'chatbot/base.html' %}
{% block title %}Chat | Health Assistant{% endblock %}
{% block content %}

    <div class="w-full max-w-4xl mx-auto p-4 md:p-8">
      {% csrf_token %}

  <style>
    /* typing dots animation */
    @keyframes blink { 50% { opacity: 0.2 } }
    .dot { display:inline-block; animation: blink 1s infinite; }
    .dot:nth-child(2){ animation-delay:0.15s }
    .dot:nth-child(3){ animation-delay:0.3s }

    /* bubble loader (three animated bubbles) */
    .bubble-loader { display:flex; gap:8px; align-items:center; }
    .bubble {
      width:10px; height:10px; border-radius:999px;
      background: rgba(0,0,0,0.15);
      transform: translateY(0);
      animation: bubble-up 0.9s infinite ease-in-out;
    }
    .bubble:nth-child(1) { animation-delay: 0s; }
    .bubble:nth-child(2) { animation-delay: 0.15s; }
    .bubble:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bubble-up {
      0% { transform: translateY(0); opacity:0.3; }
      40% { transform: translateY(-8px); opacity:1; }
      80% { transform: translateY(0); opacity:0.5; }
      100% { transform: translateY(0); opacity:0.3; }
    }

    /* dark-mode bubble colors */
    :root.dark .bubble { background: rgba(255,255,255,0.18); }

    /* shimmer bar */
    .shimmer {
      position: relative; overflow: hidden;
      background: linear-gradient(90deg, #e6f6f3, #f8fafc, #e6f6f3);
    }
    .shimmer::after {
      content: "";
      position: absolute; top:0; left:-120%;
      width:120%; height:100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { 100% { left:120%; } }

    .msg-shadow { box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
    :root.dark .msg-shadow { box-shadow: 0 6px 18px rgba(0,0,0,0.15); }
  </style>

  <div class="bg-white dark:bg-gray-800 shadow-2xl rounded-2xl overflow-hidden transition-colors duration-300">

    <!-- Chat Header -->
    <div class="flex items-center justify-between px-4 py-4 bg-teal-600 dark:bg-teal-700 text-white text-lg font-semibold">
      🩺 Health Assistant

    </div>

    <!-- Chat Box -->
    <div id="chatBox"
         class="h-screen max-h-[70vh] p-6 overflow-y-auto bg-gray-50 dark:bg-gray-700 transition-colors duration-300 space-y-4">
    </div>

    <!-- Typing bubbles -->
    <div id="typingContainer" class="px-4 py-2 hidden">
      <div class="flex items-center space-x-3">
      <img src="https://cdn-icons-png.flaticon.com/512/4712/4712100.png" class="w-8 h-8 rounded-full" alt="Bot avatar">
        <div class="bg-gray-100 dark:bg-gray-800 px-3 py-2 rounded-xl msg-shadow flex items-center gap-3">
          <div class="bubble-loader">
            <span class="bubble" style="background:#cfeee6"></span>
            <span class="bubble" style="background:#9fe2c9"></span>
            <span class="bubble" style="background:#6dd4a8"></span>
          </div>
          <div class="text-sm text-gray-700 dark:text-gray-300">
            Bot is typing<span class="ml-1 dot">.</span><span class="dot">.</span><span class="dot">.</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Shimmer Loader -->
    <div id="shimmer" class="hidden px-4">
      <div class="h-8 rounded-lg shimmer"></div>
    </div>

    <!-- Input Box -->
    <div class="flex items-center space-x-2 p-3 bg-white dark:bg-gray-800 transition-colors duration-300">

      <button onclick="startVoice()"
              class="bg-gray-200 dark:bg-gray-600 text-gray-800 dark:text-gray-200 px-3 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-500 transition">
        🎤
      </button>

      <input id="userInput"
             type="text"
             placeholder="Describe your symptoms..."
             class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-200 focus:ring-2 focus:ring-teal-500 outline-none transition"/>

      <button onclick="sendMessage()"
              class="bg-teal-600 hover:bg-teal-700 text-white px-4 py-2 rounded-lg flex items-center space-x-2">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 -ml-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 10l9-7 9 7-9 7-9-7z"/>
        </svg>
        <span>Send</span>
      </button>

    </div>
  </div>


  <!-- CHAT SCRIPT SECTION -->
  <script>


    /* Message Functions */
    const chatBox = document.getElementById("chatBox");
    const typingContainer = document.getElementById("typingContainer");
    const shimmer = document.getElementById("shimmer");

    function addMessageBubble(text, isUser = false) {

        const avatar = isUser
          ? "https://cdn-icons-png.flaticon.com/512/3177/3177440.png"
          : "https://cdn-icons-png.flaticon.com/512/4712/4712100.png";

        const wrapper = document.createElement("div");
        wrapper.className = (isUser ? "flex justify-end" : "flex justify-start")
          + " items-start space-x-2";

        const bubble = document.createElement("div");
        bubble.className = "max-w-[75%] px-4 py-3 rounded-xl msg-shadow transition-colors duration-300";
        bubble.style.whiteSpace = "pre-line";
        bubble.style.lineHeight = "1.6";

        if (isUser) {
          bubble.classList.add("bg-teal-600", "text-white", "rounded-br-none");
          bubble.innerHTML = text.replace(/\n/g, "<br>");
        } else {
          bubble.classList.add("bg-gray-200", "dark:bg-gray-600", "text-gray-800", "dark:text-gray-100", "rounded-bl-none");

          // 🔥 SMART FORMATTING FOR BOT RESPONSE
          let formatted = text;

          // Highlight disease
          formatted = formatted.replace(
            /(related to )(.*?)(\.)/,
            '$1<strong class="text-green-500">$2</strong>$3'
          );

          // Highlight confidence %
          formatted = formatted.replace(
            /(Confidence: )(\d+%)/,
            '$1<span class="bg-yellow-500 text-white px-2 py-1 rounded text-sm">$2</span>'
          );

          // Highlight sections
          formatted = formatted
            .replace(/Precautions:/g, '<br><strong>🛡️ Precautions:</strong>')
            .replace(/Consult a doctor if:/g, '<br><strong>⚠️ When to see a doctor:</strong>')
            .replace(/Other possible conditions:/g, '<br><strong>🔎 Other possibilities:</strong>')
            .replace(/Why this condition\?/g, '<br><strong>🧠 Why this condition?</strong>');

          // Convert newlines to HTML
          formatted = formatted.replace(/\n/g, "<br>");

          bubble.innerHTML = formatted;
          if (text.includes("⚠️")) {
            bubble.classList.add("border-l-4", "border-red-500");
          }
        }

        if (!isUser) {
          const img = document.createElement("img");
          img.src = avatar;
          img.className = "w-8 h-8 rounded-full";
          wrapper.appendChild(img);
          wrapper.appendChild(bubble);
        } else {
          wrapper.appendChild(bubble);
          const img = document.createElement("img");
          img.src = avatar;
          img.className = "w-8 h-8 rounded-full";
          wrapper.appendChild(img);
        }

        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
      }

      function addQuickReplies(options) {
          const container = document.createElement("div");
          container.className = "flex gap-2 flex-wrap mt-2";

          options.forEach(opt => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.className = "bg-teal-500 hover:bg-teal-600 text-white px-3 py-1 rounded-lg text-sm";

            btn.onclick = () => {
              document.getElementById("userInput").value = opt;
              sendMessage();
            };

            container.appendChild(btn);
          });

          chatBox.appendChild(container);
          chatBox.scrollTop = chatBox.scrollHeight;
        }
    /* Typing indicator */
    function showTyping(flag=true){
      typingContainer.classList.toggle("hidden", !flag);
    }


    /* Voice input */
    function startVoice(){
      if(!("webkitSpeechRecognition" in window)){
        alert("Voice not supported");
        return;
      }
      const recog = new webkitSpeechRecognition();
      recog.lang = "en-US";
      recog.start();
      recog.onresult = e => {
        document.getElementById("userInput").value = e.results[0][0].transcript;
      };
    }


    /* Send message */
    async function sendMessage(){
      const input = document.getElementById("userInput");
      const text = input.value.trim();
      if(!text) return;

      addMessageBubble(text, true);
      input.value = "";
      showTyping(true);

      const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
      const res = await fetch("/api/chat/", {
        method:"POST",
        headers:{ 
          "Content-Type":"application/json",
          "X-CSRFToken": csrfToken
        },
        body:JSON.stringify({ text })
      });

      if (!res.ok) {
        throw new Error('API failed: ' + res.status);
      }

      const data = await res.json();

      showTyping(false);
      const botText = data.bot_message.text || data.bot_message;

      addMessageBubble(botText, false);

      // 🔥 detect follow-up
      if (botText.includes("Would you like")) {
        addQuickReplies(["Treatment advice", "Prevention tips"]);
      }
    }


    /* Initial message */
    document.addEventListener("DOMContentLoaded", () =>{
      addMessageBubble("Hello! I am your health assistant. How can I help?", false);
    });

  </script>

</div>

{% endblock %}
