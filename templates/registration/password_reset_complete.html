{% extends "chatbot/base.html" %}
{% block title %}Password Reset Successful{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-screen p-6">

    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-xl max-w-md w-full text-center">

        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-4">
            🎉 Password Updated!
        </h2>

        <p class="text-gray-600 dark:text-gray-300 mb-6">
            Your password has been successfully changed.
        </p>

        <a href="{% url 'login' %}" 
           class="bg-teal-600 text-white px-6 py-3 rounded-lg hover:bg-teal-700">
            Login Now
        </a>

    </div>

</div>
{% endblock %}
