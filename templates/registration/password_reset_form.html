{% extends "chatbot/base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-screen p-6">

    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-xl max-w-md w-full">
        <h2 class="text-2xl font-bold text-gray-800 dark:text-gray-200 mb-4">🔐 Reset Your Password</h2>

        <p class="text-gray-600 dark:text-gray-300 mb-6">
            Enter your registered email. A reset link will be sent to you.
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.email.label_tag }}
            <input type="email" name="email"
                   class="w-full p-3 border border-gray-300 rounded-lg dark:bg-gray-700 dark:text-white"
                   placeholder="Enter your email" required>
            
            <button class="w-full bg-teal-600 text-white py-3 rounded-lg hover:bg-teal-700">
                Send Reset Link
            </button>
        </form>

        <div class="mt-4">
            <a href="{% url 'login' %}" 
               class="text-teal-600 dark:text-teal-400 hover:underline text-sm">
                ← Back to Login
            </a>
        </div>
    </div>

</div>
{% endblock %}
