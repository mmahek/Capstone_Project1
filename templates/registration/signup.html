{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Health Assistant</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0d9488, #0f766e);
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-6">
            <div class="w-16 h-16 bg-teal-600 rounded-full flex items-center justify-center shadow-md">
                <span class="text-3xl text-white">🩺</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mt-3">Create Account</h1>
            <p class="text-gray-500 text-sm">Join Health Assistant today</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-gray-700 font-medium">Username</label>
                <input 
                    type="text" 
                    name="username" 
                    required 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-gray-700 font-medium">Email</label>
                <input 
                    type="email" 
                    name="email" 
                    required 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <!-- Password -->
            <div>
                <label class="block text-gray-700 font-medium">Password</label>
                <input 
                    type="password" 
                    name="password1" 
                    required 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-gray-700 font-medium">Confirm Password</label>
                <input 
                    type="password" 
                    name="password2" 
                    required 
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
            </div>

            <!-- Signup Button -->
            <button type="submit" 
                class="w-full bg-teal-600 hover:bg-teal-700 text-white py-2 rounded-lg font-semibold transition">
                Create Account
            </button>
        </form>

        <!-- Links -->
        <div class="text-center mt-4">
            <p class="text-sm text-gray-600">
                Already have an account?
                <a href="/accounts/login/" class="text-teal-600 font-semibold hover:underline">Login</a>
            </p>
        </div>

    </div>

</body>
</html>
